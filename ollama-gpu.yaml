apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-gpu
  template:
    metadata:
      labels:
        app: ollama-gpu
    spec:
      runtimeClassName: nvidia 
      nodeSelector:
        accelerator: nvidia-t4
      containers:
      - name: ollama
        image: ollama/ollama:latest 
        imagePullPolicy: IfNotPresent  
        ports:
        - containerPort: 11434
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: 1
        volumeMounts:
        # --- 所有的挂载必须放在同一个 volumeMounts 列表下 ---
        - name: ollama-storage
          mountPath: /root/.ollama
        - name: nfs-ai-demo
          mountPath: /app/data/knowledge
          subPath: knowledge
          readOnly: true
        - name: nfs-ai-demo
          mountPath: /app/user-images
          subPath: user-images
      volumes:
      # --- 所有的卷定义必须放在同一个 volumes 列表下 ---
      - name: ollama-storage
        hostPath:
          path: /data00/k3s/ollama-models
          type: DirectoryOrCreate
      - name: nfs-ai-demo
        hostPath:
          # 指向你 Master 节点同步过来的 NFS 共享路径
          path: /mnt/shared_storage/ai-demo 
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-gpu-svc
spec:
  selector:
    app: ollama-gpu
  ports:
  - protocol: TCP
    port: 11434
    targetPort: 11434