<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE AIOps 智能终端 - Qwen-VL/Llama3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* 滚动条样式 */
        #chat-box::-webkit-scrollbar, #search-results::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb, #search-results::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 闪烁效果 */
        @keyframes blink { 50% { opacity: 0.5; } }
        .blinking { animation: blink 1s linear infinite; }
        
        /* 代码块换行处理 */
        pre { white-space: pre-wrap; word-wrap: break-word; background: #f8fafc; padding: 10px; border-radius: 4px; margin: 5px 0; border: 1px solid #e2e8f0; }
        code { font-family: 'Fira Code', monospace; font-size: 0.85rem; }
    </style>
</head>

<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

<header class="bg-slate-900 text-white p-3 shadow-xl flex items-center justify-between">
    <div class="flex items-center space-x-3">
        <div class="w-3 h-3 bg-green-500 rounded-full blinking"></div>
        <h1 class="font-mono text-xl tracking-wider text-green-400">AIOPS-CORE VISION_AGENT</h1>
    </div>
    <div class="text-xs text-slate-400 font-mono text-right leading-tight">
        Cluster: K3s Edge | Storage: 500GB PVC <br>
        Compute: 32C/128G + NVIDIA T4 GPU
    </div>
</header>

<div class="flex-1 flex overflow-hidden">
    <div class="flex-1 flex flex-col bg-slate-50 border-r border-slate-200 relative">
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="flex justify-start">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200 max-w-[80%] text-sm">
                    🚀 **SRE AIOps v18 视觉增强版** 已就绪。<br><br>
                    你可以：<br>
                    1. 直接描述 K8s 故障或性能问题。<br>
                    2. 粘贴日志内容进行分析。<br>
                    3. **点击左下角图标**上传监控面板或错误截图。
                </div>
            </div>
        </div>

        <div id="image-preview-container" class="hidden px-6 py-2 bg-white border-t border-slate-200 flex items-center space-x-3">
            <div class="relative">
                <img id="image-preview" src="" class="h-20 w-auto rounded border-2 border-blue-500 shadow-md">
                <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center shadow-lg">×</button>
            </div>
            <div class="flex flex-col">
                <span id="image-name" class="text-xs text-slate-500 font-mono font-bold"></span>
                <span class="text-[10px] text-slate-400">Ready for Vision Analysis</span>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-slate-300 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="max-w-4xl mx-auto flex items-end space-x-2">
                <button onclick="document.getElementById('file-input').click()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(this)">
                
                <textarea id="user-input" 
                       class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:border-blue-500 outline-none transition-all resize-none h-12 pt-3" 
                       placeholder="输入运维问题、K8S日志、架构需求..."
                       onkeyup="if(event.keyCode==13 && !event.shiftKey) send()"></textarea>
                
                <button onclick="send()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95 shadow-md">
                    发送
                </button>
            </div>
        </div>
    </div>

    <aside class="w-80 flex flex-col p-4 bg-white border-l border-slate-300">
        <div class="mb-6 p-4 border border-slate-200 rounded-xl bg-slate-50 shadow-inner">
            <h3 class="font-bold text-slate-700 mb-3 text-sm flex items-center">
                <span class="mr-2">📡</span> 节点算力状态
            </h3>
            <div class="space-y-3 text-xs font-mono">
                <div class="flex items-center justify-between">
                    <span class="text-slate-600">Ollama-RAG (CPU)</span>
                    <div id="status-70b" class="w-3 h-3 rounded-full bg-green-500 shadow-sm"></div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-slate-600">Qwen-Vision (GPU)</span>
                    <div id="status-gpu" class="w-3 h-3 rounded-full bg-slate-300 transition-colors duration-500"></div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <h3 class="font-bold text-slate-700 mb-3 text-sm flex items-center">
                <span class="mr-2">🔍</span> 知识库/历史检索
            </h3>
            <div class="flex space-x-1 mb-3">
                <input id="search-input" type="text" class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-1.5 focus:border-green-500 outline-none" placeholder="PVC, CrashLoop...">
                <button onclick="searchHistory()" class="bg-slate-800 text-white text-xs px-3 rounded-lg hover:bg-black transition">搜索</button>
            </div>
            <div id="search-results" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </aside>
</div>

<script>
    // --- 1. 初始化配置 ---
    marked.setOptions({ sanitize: false, breaks: true });
    let currentImageName = "";

    // --- 2. 基础 UI 函数 ---
    function appendMessage(role, content) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = role === 'user' ? "flex justify-end mb-4" : "flex justify-start mb-4";
        
        const bgColor = role === 'user' ? "bg-blue-600 text-white shadow-md" : "bg-white border border-slate-200 shadow-sm";
        
        div.innerHTML = `
            <div class="${bgColor} p-3 rounded-2xl max-w-[85%] text-sm">
                ${role === 'user' ? content : marked.parse(content)}
            </div>
        `;
        
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            currentImageName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
                document.getElementById('image-name').innerText = currentImageName;
            }
            reader.readAsDataURL(file);
        }
    }

    function clearImage() {
        currentImageName = "";
        document.getElementById('file-input').value = "";
        document.getElementById('image-preview-container').classList.add('hidden');
    }

    // --- 3. 核心流式发送逻辑 ---
async function send() {
    const input = document.getElementById('user-input');
    const fileInput = document.getElementById('file-input');
    const prompt = input.value.trim();
    
    if (!prompt && fileInput.files.length === 0) return;

    // 1. 用户消息预显
    const tempFileName = fileInput.files.length > 0 ? fileInput.files[0].name : "";
    appendMessage('user', tempFileName ? `[图片上传: ${tempFileName}]\n${prompt}` : prompt);
    input.value = '';

    // 2. 创建 AI 容器
    const box = document.getElementById('chat-box');
    const aiDiv = document.createElement('div');
    aiDiv.className = "flex justify-start mb-4";
    aiDiv.innerHTML = `
        <div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm max-w-[85%] text-sm relative">
            <div id="current-think" class="text-slate-400 italic mb-2 hidden border-l-2 border-slate-200 pl-3 py-1"></div>
            <div id="current-answer" class="prose prose-sm prose-slate text-slate-500">正在链接 SRE 知识库...</div>
            <div id="current-debug" class="hidden mt-3 pt-2 border-t border-dashed border-slate-100 flex justify-end"></div>
        </div>`;
    box.appendChild(aiDiv);
    
    const thinkArea = aiDiv.querySelector('#current-think');
    const answerArea = aiDiv.querySelector('#current-answer');
    const debugArea = aiDiv.querySelector('#current-debug');

    try {
        // A. 图片上传逻辑
        let serverFileName = "";
        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            const upRes = await fetch('/upload', { method: 'POST', body: formData });
            const upData = await upRes.json();
            serverFileName = upData.filename;
        }

        // B. 流式传输
        const url = `/aigpt_api?prompt=${encodeURIComponent(prompt)}&image=${encodeURIComponent(serverFileName)}`;
        const response = await fetch(url);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        let fullContent = "";
        let hasFixedAnswer = false;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const jsonStr = line.replace('data: ', '').trim();
                    if (!jsonStr) continue;

                    try {
                        const data = JSON.parse(jsonStr);
                        
                        // --- 核心改动：解析后端发来的第一个 Dist 包 ---
                        if (data.debug_dist !== undefined) {
                            debugArea.classList.remove('hidden');
                            // 阈值判断：1.3 以内算命中
                            let isHit = data.debug_dist < 1.3;
                            let status = isHit ? "🎯 知识命中" : "🌐 通用知识";
                            let color = isHit ? "#10b981" : "#f59e0b";
                            debugArea.innerHTML = `
                                <div class="text-[10px] font-mono flex items-center space-x-2">
                                    <span style="color: ${color}; font-weight: bold;">${status}</span>
                                    <span class="text-slate-300">|</span>
                                    <span class="text-slate-400">Dist: ${data.debug_dist.toFixed(4)}</span>
                                </div>`;
                            continue; // 处理完 Dist 包，跳过后续逻辑
                        }

                        // --- 解析 Ollama 正常的文字包 ---
                        if (data.response) {
                            if (!hasFixedAnswer) {
                                answerArea.innerText = ""; // 收到第一个字时，清空“正在链接...”提示
                                answerArea.classList.remove('text-slate-500');
                                hasFixedAnswer = true;
                            }

                            fullContent += data.response;
                            
                            // 处理思考逻辑 <think>
                            if (fullContent.includes('<think>') && !fullContent.includes('</think>')) {
                                thinkArea.classList.remove('hidden');
                                thinkArea.innerText = "🤔 推理中: " + fullContent.split('<think>')[1];
                            } else if (fullContent.includes('</think>')) {
                                let parts = fullContent.split('</think>');
                                thinkArea.innerText = "💡 诊断路径: " + parts[0].replace('<think>', '').trim();
                                answerArea.innerHTML = marked.parse(parts[1].trim());
                            } else {
                                answerArea.innerHTML = marked.parse(fullContent);
                            }
                        }
                    } catch (e) { console.log("JSON 解析跳过:", e); }
                }
            }
            box.scrollTop = box.scrollHeight;
        }
        clearImage();

    } catch (e) {
        answerArea.innerHTML = `<span class="text-red-500">❌ 调度失败: ${e.message}</span>`;
    }
}

    // --- 4. 检索逻辑 ---
    async function searchHistory() {
        const q = document.getElementById('search-input').value.trim();
        const resultsBox = document.getElementById('search-results');
        if (!q) return;

        resultsBox.innerHTML = '<div class="text-center text-slate-400 py-6 animate-pulse text-xs">正在穿透索引层...</div>';
        
        try {
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            resultsBox.innerHTML = '';
            
            if (data.length === 0) {
                resultsBox.innerHTML = '<div class="text-center text-slate-400 py-4 text-xs">无匹配的历史案例</div>';
                return;
            }
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-2.5 bg-white rounded-lg border border-slate-200 text-[10px] hover:border-blue-400 transition cursor-help shadow-sm";
                div.innerHTML = `
                    <div class="text-slate-400 mb-1 flex justify-between">
                        <span>📅 ${item.time}</span>
                        <span class="text-blue-500 font-bold">MATCH</span>
                    </div>
                    <div class="line-clamp-2"><b>Q:</b> ${item.prompt}</div>
                    <div class="line-clamp-2 text-slate-500 italic mt-1 border-t pt-1"><b>A:</b> ${item.response}</div>
                `;
                resultsBox.appendChild(div);
            });
        } catch (e) { 
            resultsBox.innerHTML = '<div class="text-red-400 text-center py-4">检索接口离线</div>'; 
        }
    }
</script>
</body>
</html>
