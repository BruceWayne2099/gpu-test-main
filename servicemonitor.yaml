apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter
  labels:
    release: prometheus # 确保这个 label 能被你的 Prometheus 实例匹配到
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-dcgm-exporter
  endpoints:
  - port: metrics # 对应 exporter 的 9400 端口名
    interval: 15s # SRE 经验：GPU 变化快，采样间隔不建议太长