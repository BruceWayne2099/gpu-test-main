# ollama-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      runtimeClassName: nvidia 
      nodeSelector:
        accelerator: nvidia-t4
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama
        - name: nfs-ai-demo
          mountPath: /app/data/knowledge
          subPath: knowledge
          readOnly: true
        - name: nfs-ai-demo
          mountPath: /app/user-images
          subPath: user-images
        resources:
          requests:
            cpu: "8"
            memory: "16Gi"
            nvidia.com/gpu: 1 
          limits:
            cpu: "24"
            memory: "64Gi"
            nvidia.com/gpu: 1
      volumes:
      - name: ollama-models
        hostPath:
          path: /data00/shared_storage/ollama-models/
          type: DirectoryOrCreate
      - name: nfs-ai-demo
        hostPath:
          path: /data00/shared_storage/ai-demo 
          type: Directory 
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-svc
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434